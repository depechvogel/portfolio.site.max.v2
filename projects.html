<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Max Portfolio — Projects</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Pixelify+Sans:wght@400;500;600;700&display=swap" 
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-page="projects">
  <div class="desktop" id="desktop">
    <div class="screen-wipe" id="screenWipe"></div>

    <header class="menu-bar">
      <a class="system-button" href="index.html">← BACK</a>

      <div class="menu-spacer"></div>
    </header>

    <main class="screen">
      <section class="page-header">
        <p class="system-label">/archive/selected_work</p>

        <h1>Projects</h1>

        <p>
          A curated selection of projects I have done during my (ongoing) time at the <code>Technical University of Eindhoven</code>
        </p>
      </section>

      <section class="projects-grid" id="projectsGrid"></section>
    </main>

    <div class="modal-overlay" id="projectOverlay" aria-hidden="true">
      <article class="window project-modal" role="dialog" aria-modal="true">
        <div class="window-bar">
          <div class="window-controls">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <p id="projectModalFile">project-file.txt</p>

          <button class="close-button" id="projectClose" type="button" aria-label="Close project">
            ×
          </button>
        </div>

        <div class="project-modal-body" id="projectModalBody">
          <section class="project-image-panel">
            <button class="main-image-button" id="projectMainImage" type="button">
              <img src="" alt="" id="projectMainImageTag">
            </button>

            <div class="image-status">
              <span id="projectImageCounter">01 / 01</span>
              <span id="projectImageCaption">caption</span>
            </div>

            <div class="gallery-strip" id="projectGalleryStrip"></div>
          </section>

          <section class="project-text-panel">
            <p class="system-label" id="projectModalCategory">category</p>

            <h2 id="projectModalTitle">Project title</h2>

            <p class="project-lead" id="projectModalLead">
              Project note.
            </p>

            <div class="project-section">
              <h3>Overview</h3>
              <p id="projectModalOverview"></p>
            </div>

            <div class="project-section">
              <h3>Process</h3>
              <p id="projectModalProcess"></p>
            </div>

            <div class="project-section">
              <h3>Outcome</h3>
              <p id="projectModalOutcome"></p>
            </div>

            <div class="project-tags" id="projectModalTags"></div>
          </section>
        </div>

        <div class="lightbox" id="lightbox" aria-hidden="true">
          <div class="lightbox-top">
            <button id="lightboxBack" type="button">← Back</button>
            <span id="lightboxCounter">1 / 1</span>
          </div>

          <div class="lightbox-stage">
            <button id="lightboxPrev" type="button">‹</button>
            <img src="" alt="" id="lightboxImage">
            <button id="lightboxNext" type="button">›</button>
          </div>
        </div>
      </article>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
