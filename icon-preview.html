<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Preview</title>

  <style>
    :root {
      --bg: #9ca584;
      --bg-dark: #1b2113;
      --paper: #d8d9bd;
      --ink: #1e2517;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(30, 37, 23, 0.05) 50%, transparent 50%),
        var(--bg);
      background-size: 100% 4px;
      border: 8px solid var(--bg-dark);
      font-family: monospace;
      color: var(--ink);
      display: grid;
      place-items: center;
    }

    .preview-grid {
      display: flex;
      gap: 76px;
      align-items: start;
      justify-content: center;
      flex-wrap: wrap;
      padding: 56px;
    }

    .desktop-file {
      width: 132px;
      display: grid;
      grid-template-rows: 88px auto;
      justify-items: center;
      align-items: start;
      gap: 14px;
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .desktop-file p {
      display: inline-block;
      padding: 2px 6px;
      line-height: 1.2;
      transition: background 120ms steps(2), color 120ms steps(2);
    }

    .desktop-file:hover p {
      background: var(--ink);
      color: var(--paper);
    }

    .folder-icon,
    .file-icon,
    .link-icon {
      width: 88px;
      height: 88px;
      display: block;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.88;
      transition:
        transform 120ms steps(2),
        opacity 120ms steps(2),
        filter 120ms steps(2);
      pointer-events: none;
    }

    .desktop-file:hover .folder-icon,
    .desktop-file:hover .file-icon,
    .desktop-file:hover .link-icon {
      transform: translateY(-3px);
      opacity: 1;
      filter: drop-shadow(4px 4px 0 rgba(30, 37, 23, 1));
    }

    /* Folder — taller body, smooth diagonal */
    .folder-icon {
      background-image: url("data:image/svg+xml,%3Csvg width='88' height='88' viewBox='0 0 88 88' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 74V24H36L48 38H76V74H10Z' fill='%23d8d9bd' stroke='%231e2517' stroke-width='4' stroke-linejoin='miter'/%3E%3Cpath d='M18 66H68' stroke='%231e2517' stroke-width='3' opacity='0.14'/%3E%3C/svg%3E");
    }

    /* Document */
    .file-icon {
      background-image: url("data:image/svg+xml,%3Csvg width='88' height='88' viewBox='0 0 88 88' xmlns='http://www.w3.org/2000/svg' shape-rendering='crispEdges'%3E%3Cpath d='M25 10H52L66 24V74H25V10Z' fill='%23d8d9bd' stroke='%231e2517' stroke-width='4' stroke-linejoin='miter'/%3E%3Cpath d='M52 10V24H66' fill='none' stroke='%231e2517' stroke-width='4' stroke-linejoin='miter'/%3E%3Cpath d='M35 37H56M35 47H56M35 57H50' stroke='%231e2517' stroke-width='4' opacity='0.32' stroke-linecap='square'/%3E%3C/svg%3E");
    }

    /* Browser / website link */
    .link-icon {
      background-image: url("data:image/svg+xml,%3Csvg width='88' height='88' viewBox='0 0 88 88' xmlns='http://www.w3.org/2000/svg' shape-rendering='crispEdges'%3E%3Crect x='16' y='20' width='56' height='44' fill='%23d8d9bd' stroke='%231e2517' stroke-width='4'/%3E%3Cpath d='M16 32H72' stroke='%231e2517' stroke-width='4'/%3E%3Crect x='22' y='25' width='4' height='4' fill='%231e2517' opacity='0.34'/%3E%3Crect x='30' y='25' width='4' height='4' fill='%231e2517' opacity='0.34'/%3E%3Crect x='38' y='25' width='4' height='4' fill='%231e2517' opacity='0.34'/%3E%3Cpath d='M28 43H58M28 52H52' stroke='%231e2517' stroke-width='4' opacity='0.24' stroke-linecap='square'/%3E%3C/svg%3E");
    }
  </style>
</head>

<body>
  <section class="preview-grid">
    <div class="desktop-file">
      <span class="folder-icon" aria-hidden="true"></span>
      <p>Projects</p>
    </div>

    <div class="desktop-file">
      <span class="file-icon" aria-hidden="true"></span>
      <p>Document</p>
    </div>

    <div class="desktop-file">
      <span class="link-icon" aria-hidden="true"></span>
      <p>TU/e</p>
    </div>
  </section>
</body>
</html>
